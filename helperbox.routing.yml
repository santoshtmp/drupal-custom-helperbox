helperbox.settings:
  path: '/admin/config/development/customhelperbox'
  defaults:
    _form: '\Drupal\helperbox\Form\HelperboxSettingsForm'
    _title: 'Custom Helperbox settings'
  requirements:
    _permission: 'administer site configuration'
helperbox.api_test:
  path: '/api/testhelperbox'
  defaults:
    _controller: '\Drupal\helperbox\Controller\TestApiController::getData'
    _format: 'json'
  requirements:
    _permission: 'access content'
  methods: [GET]
