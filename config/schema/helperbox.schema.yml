helperbox.settings:
  type: config_object
  label: "Custom Helperbox settings"
  mapping:
    enable_helperbox:
      type: boolean
      label: "Enable Helperbox"
    enable_media_custom_thumbnail:
      type: boolean
      label: "Enable custom media thumbnail"
    enable_unique_node_per_bundle:
      type: boolean
      label: "Enable unique node/item per content bundle"
    enable_only_alies_login_url:
      type: boolean
      label: "Enable Only Aliases Login URL"
    helperbox_text:
      type: text
      label: "Helperbox text"
    cdn:
      type: mapping
      label: "CDN Configuration"
      mapping:
        cdn_select2:
          type: boolean
          label: "Enable select2 from CDN"
        cdn_lightgallery:
          type: boolean
          label: "Enable lightgallery from CDN"
    field_all_rules:
      type: ignore
      label: "Field Rules All"
    field_rules_node:
      type: ignore
      label: "Node Field Rules"
    field_rules_form:
      type: ignore
      label: "Form Field Rules"
    field_rules_max_content:
      type: ignore
      label: "Maximum Content Nodes"

block.settings.helperbox_menu_block:
  type: block_settings
  label: "Helperbox Menu Block settings"
  mapping:
    menu_layout:
      type: string
      label: "Menu layout"
    menu_layout_subtype:
      type: string
      label: "Menu layout subtype"
    menu_layout_location:
      type: string
      label: "Menu layout location"
    mobile_menu_panel_title:
      type: string
      label: "Mobile menu panel title"
    menu_title:
      type: string
      label: "Menu title"
      translatable: true
    menu_type:
      type: string
      label: "Menu type"
    menu_items:
      type: sequence
      label: "Menu items"
      sequence:
        type: string
    background_image:
      type: integer
      label: "Background image (media ID)"
    background_image_style:
      type: string
      label: "Background image style"
    menu_levels:
      type: integer
      label: "Menu levels"
    social_link_title:
      type: string
      label: "Social link title"

block.settings.helperbox_repeated_content_block:
  type: block_settings
  label: "Helperbox Repeated Content Block settings"
  mapping:
    block_layout:
      type: string
      label: "Block layout"
    section_title:
      type: string
      label: "Section title"
    section_sub_title:
      type: string
      label: "Section sub title"
    content_list:
      type: sequence
      label: "Content list"
      sequence:
        type: mapping
        mapping:
          content:
            type: mapping
            mapping:
              title:
                type: string
                label: "Title"
              sub_title:
                type: string
                label: "Sub title"
              description:
                type: mapping
                mapping:
                  value:
                    type: text
                    label: "Description value"
                  format:
                    type: string
                    label: "Description format"
              feature_image:
                type: integer
                label: "Feature image"
              feature_image_style:
                type: string
                label: "Feature image style"
          weight:
            type: integer
            label: "Weight"
    other_meta_info:
      type: mapping
      mapping:
        background_image:
          type: integer
          label: "Background image"
        background_image_style:
          type: string
          label: "Background image style"

